<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>떡들의 모험 - 수학 퀴즈 동화</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #4a3b2a;
    --paper: #fff8ec;
    --gold: #f4b942;
  }

  body {
    font-family: "Nanum Gothic", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(160deg, #ffd89b 0%, #ffb88c 40%, #c9a0ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    color: var(--ink);
  }

  /* 떠다니는 구름 배경 */
  .cloud {
    position: fixed;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    filter: blur(2px);
    pointer-events: none;
    z-index: 0;
    animation: drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute; background: inherit; border-radius: 50%;
  }
  .cloud::before { width: 60%; height: 80%; top: -30%; left: 15%; }
  .cloud::after { width: 50%; height: 70%; top: -20%; right: 12%; }
  @keyframes drift {
    from { transform: translateX(-30vw); }
    to   { transform: translateX(130vw); }
  }

  .stage {
    position: relative;
    z-index: 1;
    width: 92%;
    max-width: 620px;
    background: var(--paper);
    border: 6px solid #fff;
    border-radius: 28px;
    box-shadow: 0 18px 50px rgba(120,80,40,0.35);
    padding: 26px 24px 30px;
    min-height: 560px;
    overflow: hidden;
  }

  /* 진행 막대 */
  .progress-wrap {
    display: flex; gap: 6px; justify-content: center; margin-bottom: 14px;
  }
  .pip {
    width: 22px; height: 8px; border-radius: 6px;
    background: #e7d8bf; transition: background .4s, transform .4s;
  }
  .pip.done { background: var(--gold); }
  .pip.current { background: #ff8a5b; transform: scaleY(1.6); }

  .scene { text-align: center; animation: pageIn .55s ease; }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(24px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  h1 {
    font-size: 30px; color: #b5651d; margin-bottom: 8px;
    text-shadow: 2px 2px 0 #fff;
  }
  .subtitle { font-size: 15px; color: #8a7a64; margin-bottom: 18px; }

  /* 캐릭터 무대 */
  .actors {
    display: flex; justify-content: center; align-items: flex-end;
    gap: 14px; margin: 6px 0 14px; min-height: 130px;
  }
  .actor { text-align: center; animation: bob 2.4s ease-in-out infinite; }
  .actor:nth-child(2) { animation-delay: .5s; }
  .actor:nth-child(3) { animation-delay: 1s; }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .actor .face { font-size: 64px; line-height: 1; filter: drop-shadow(0 6px 4px rgba(0,0,0,.15)); }
  .actor .tag { font-size: 13px; margin-top: 4px; font-weight: bold; color: #6b5a44; }

  /* 떡 캐릭터(CSS) */
  .tteok {
    width: 74px; height: 60px; border-radius: 50% 50% 46% 46%;
    position: relative; margin: 0 auto;
    box-shadow: inset 0 -8px 0 rgba(0,0,0,.06), 0 6px 6px rgba(0,0,0,.15);
  }
  .tteok.baram { background: linear-gradient(#fff,#ffe3ef); border: 2px solid #ffc2dc; }
  .tteok.butter { background: linear-gradient(#fff6cf,#ffd86b); border: 2px solid #f3c64b; }
  .tteok .eyes { position:absolute; top:22px; width:100%; display:flex; justify-content:center; gap:14px; }
  .tteok .eyes span { width:7px; height:9px; background:#3a2f22; border-radius:50%; }
  .tteok .mouth { position:absolute; bottom:13px; left:50%; transform:translateX(-50%);
    width:14px; height:7px; border-bottom:3px solid #c0607a; border-radius:0 0 12px 12px; }
  .tteok .cheek { position:absolute; top:31px; width:9px; height:6px; background:#ffb0c8; border-radius:50%; opacity:.8;}
  .tteok .cheek.l{left:11px;} .tteok .cheek.r{right:11px;}

  .speech {
    background: #fff; border: 3px solid #ffd9a0; border-radius: 18px;
    padding: 14px 16px; font-size: 17px; line-height: 1.55;
    margin: 6px auto 16px; max-width: 480px; position: relative;
    box-shadow: 0 4px 0 #f0d9b0;
  }
  .speech b { color: #d2691e; }

  .qbox {
    background: #fffdf6; border: 3px dashed #f4b942; border-radius: 16px;
    padding: 16px; margin-bottom: 16px; font-size: 19px; font-weight: bold;
  }
  .qbox .calc { font-size: 22px; color: #b5651d; margin-top: 8px; letter-spacing: 1px; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opt {
    font-family: inherit; font-size: 20px; font-weight: bold; cursor: pointer;
    padding: 16px; border-radius: 16px; border: 3px solid #f0c987;
    background: #fff; color: var(--ink); transition: transform .15s, background .2s;
  }
  .opt:hover { transform: translateY(-3px); background: #fff3d6; }
  .opt.correct { background: #b6f0b6; border-color: #4caf50; animation: pop .4s; }
  .opt.wrong { background: #ffc9c2; border-color: #e74c3c; animation: shake .4s; }
  @keyframes pop { 0%{transform:scale(1);}50%{transform:scale(1.12);}100%{transform:scale(1);} }
  @keyframes shake {
    0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);}
  }

  .feedback {
    margin-top: 14px; font-size: 18px; font-weight: bold; min-height: 28px;
  }
  .feedback.good { color: #2e9e44; }
  .feedback.bad { color: #e0533d; }

  .btn {
    font-family: inherit; font-size: 19px; font-weight: bold; cursor: pointer;
    padding: 14px 30px; border: none; border-radius: 30px; color: #fff;
    background: linear-gradient(#ff9a5b,#ff6f3c); margin-top: 16px;
    box-shadow: 0 6px 0 #d9531f; transition: transform .1s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d9531f; }

  .hint {
    margin-top: 12px; font-size: 14px; color: #9a8a72; cursor: pointer;
    text-decoration: underline dotted;
  }
  .hint-text { margin-top: 8px; font-size: 14px; color: #7a6a52; display: none; }

  /* 색종이 */
  .confetti {
    position: fixed; top: -10px; width: 10px; height: 16px; z-index: 50;
    animation: fall linear forwards; pointer-events: none;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); opacity: .9; }
  }

  /* 그림 영역 */
  .pic { font-size: 56px; margin: 6px 0 4px; }
  .ladder-pic { font-size: 40px; letter-spacing: 4px; }

  .ending .face { font-size: 90px; }
  .scoreline { font-size: 20px; margin: 12px 0; color: #6b5a44; }

  /* 소리 켜기/끄기 버튼 */
  #muteBtn {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
    border: 3px solid #fff; background: #ff8a5b; color: #fff;
    font-size: 22px; box-shadow: 0 4px 12px rgba(0,0,0,.25);
    transition: transform .15s;
  }
  #muteBtn:hover { transform: scale(1.1); }
  #muteBtn:active { transform: scale(.92); }
</style>
</head>
<body>

<button id="muteBtn" title="소리 켜기/끄기" onclick="onMuteClick()">🔊</button>
<div class="stage" id="stage"></div>

<script>
/* ====== 동화 + 퀴즈 데이터 ====== */
const baramSVG = `<div class="tteok baram"><div class="eyes"><span></span><span></span></div><div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div></div>`;
const butterSVG = `<div class="tteok butter"><div class="eyes"><span></span><span></span></div><div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div></div>`;

const quizzes = [
  {
    enemy: "🪜", enemyName: "책상 끝!",
    story: "떡집에서 도망친 <b>바람떡</b>과 <b>버터떡</b>! 그런데 책상 끝까지 와버렸어요. 사다리를 만들어야 해요.",
    question: "나무젓가락 한 개는 <b>9cm</b>, 책상 높이는 <b>72cm</b>. 사다리를 만들려면 젓가락이 몇 개 필요할까?",
    calc: "72 ÷ 9 = ?",
    options: ["6", "8", "9", "18"], answer: "8",
    hint: "9단을 떠올려봐! 9 × 8 = 72",
    win: "딱 맞아! 젓가락 8개로 멋진 사다리 완성! 🪜"
  },
  {
    enemy: "🕳️", enemyName: "웅덩이",
    story: "사다리를 타고 내려오니 이번엔 커다란 <b>웅덩이</b>가! 블록으로 다리를 놓아야 해요.",
    question: "블록 한 개는 <b>3cm</b>, 웅덩이는 <b>18cm</b>. 다리를 만들려면 블록이 몇 개 필요할까?",
    calc: "18 ÷ 3 = ?",
    options: ["5", "6", "9", "3"], answer: "6",
    hint: "3씩 더해서 18이 되려면? 3 × 6 = 18",
    win: "정답! 블록 6개로 다리를 놓고 무사히 건넜어요! 🌉"
  },
  {
    enemy: "🐶", enemyName: "강아지",
    story: "다리를 건너니 배고픈 <b>강아지</b>가 나타났어요! \"맛있는 떡이군, 먹어야지!\"",
    question: "강아지가 문제를 냈어요: \"뼈다귀가 <b>18개</b> 있었는데 <b>7개</b>를 더 받았어. 모두 몇 개?\"",
    calc: "18 + 7 = ?",
    options: ["24", "25", "15", "21"], answer: "25",
    hint: "8 + 7 = 15, 받아올림! 10 + 10 + 5 = 25",
    win: "맞았어! 강아지가 깜짝 놀라 길을 비켜줬어요! 🦴"
  },
  {
    enemy: "🐭", enemyName: "생쥐",
    story: "이번엔 <b>생쥐</b>가 나타났어요! \"우릴 먹지 않으면 문제를 풀어드릴게요!\"",
    question: "생쥐의 문제: \"치즈가 <b>21개</b> 있었는데 <b>9개</b>를 먹었어. 몇 개가 남았지?\"",
    calc: "21 − 9 = ?",
    options: ["11", "12", "13", "10"], answer: "12",
    hint: "21에서 1씩 거꾸로 9번 세어봐. 또는 21 - 9 = 12",
    win: "정답! 생쥐도 충격을 받고 떡들을 보내줬어요! 🧀"
  },
  {
    enemy: "🐱", enemyName: "고양이",
    story: "창문으로 가려는데 무서운 <b>고양이</b>가! \"내 문제를 못 맞추면 너희를 먹어버리겠어!\"",
    question: "고양이의 문제: \"물고기 <b>14마리</b>를 잡았는데 한 마리에 뼈가 <b>10개</b>씩 있어. 뼈는 모두 몇 개?\"",
    calc: "14 × 10 = ?",
    options: ["14", "140", "104", "40"], answer: "140",
    hint: "14 × 1 = 14, 뒤에 0을 붙이면? 140!",
    win: "와! 바람떡이 1초 만에 풀었어요. 고양이도 눈을 비볐죠! 🐟"
  },
  {
    enemy: "🎈", enemyName: "풍선",
    story: "책상 위에 올라왔지만 창문이 너무 높아요. <b>풍선</b>을 타고 올라가야 해요!",
    question: "풍선 한 개는 <b>0.2kg</b>까지 들어요. 바람떡은 <b>0.8kg</b>, 버터떡은 <b>0.6kg</b>. 풍선이 모두 몇 개 필요할까?",
    calc: "(0.8 ÷ 0.2) + (0.6 ÷ 0.2) = ?",
    options: ["6", "7", "8", "5"], answer: "7",
    hint: "바람떡 0.2×4=0.8 → 4개, 버터떡 0.2×3=0.6 → 3개. 합치면?",
    win: "정답! 바람떡 4개 + 버터떡 3개 = 풍선 7개로 둥실 떠올랐어요! 🎈"
  },
  {
    enemy: "🐦", enemyName: "새",
    story: "마지막 관문! 창문 밖으로 나가야 해요. <b>새</b>에게 부탁했어요. \"문제를 맞추면 꺼내줄게!\"",
    question: "새의 문제: \"<b>이등변삼각형</b>의 꼭지각이 <b>72°</b>야. 그럼 한 밑각은 몇 도일까?\"",
    calc: "(180 − 72) ÷ 2 = ?",
    options: ["108°", "54°", "72°", "36°"], answer: "54°",
    hint: "삼각형 세 각의 합은 180°. 180−72=108, 두 밑각이 같으니 ÷2!",
    win: "완벽해! 새가 떡들의 똑똑함에 놀라 밖으로 꺼내줬어요! 🐦"
  }
];

/* ====== 소리 엔진 (Web Audio - 외부 파일 없음) ====== */
const Sound = {
  ctx: null, master: null, bgGain: null, bgTimer: null, muted: false,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.9;
    this.master.connect(this.ctx.destination);
    this.bgGain = this.ctx.createGain();
    this.bgGain.gain.value = 0.16;
    this.bgGain.connect(this.master);
  },
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  // 단일 음 재생
  tone(freq, start, dur, type = 'sine', vol = 0.5, dest = null) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.connect(g); g.connect(dest || this.master);
    o.start(start); o.stop(start + dur + 0.05);
  },
  // 효과음
  sfx(name) {
    if (!this.ctx || this.muted) return;
    this.resume();
    const t = this.ctx.currentTime;
    if (name === 'click') {
      this.tone(440, t, 0.08, 'square', 0.25);
    } else if (name === 'correct') {
      [523, 659, 784, 1047].forEach((f, i) => this.tone(f, t + i * 0.09, 0.25, 'triangle', 0.45));
    } else if (name === 'wrong') {
      this.tone(220, t, 0.18, 'sawtooth', 0.4);
      this.tone(160, t + 0.12, 0.25, 'sawtooth', 0.4);
    } else if (name === 'fanfare') {
      const seq = [523, 523, 523, 523, 659, 0, 659, 784];
      seq.forEach((f, i) => { if (f) this.tone(f, t + i * 0.16, 0.4, 'triangle', 0.5); });
      this.tone(262, t, 1.6, 'sine', 0.3);
    }
  },
  // 배경음악 (밝은 멜로디 반복)
  startBg() {
    if (!this.ctx || this.bgTimer) return;
    const notes = [392, 440, 523, 440, 392, 330, 392, 0,
                   349, 392, 440, 392, 349, 294, 262, 0];
    const bass = [196, 0, 220, 0, 196, 0, 165, 0,
                  175, 0, 196, 0, 147, 0, 131, 0];
    const step = 0.34;
    let beat = 0;
    const tick = () => {
      if (this.muted) return;
      const t = this.ctx.currentTime + 0.05;
      const n = notes[beat % notes.length];
      const b = bass[beat % bass.length];
      if (n) this.tone(n, t, step * 0.9, 'triangle', 0.5, this.bgGain);
      if (b) this.tone(b, t, step * 1.6, 'sine', 0.6, this.bgGain);
      beat++;
    };
    tick();
    this.bgTimer = setInterval(tick, step * 1000);
  },
  stopBg() { if (this.bgTimer) { clearInterval(this.bgTimer); this.bgTimer = null; } },
  toggleMute() {
    this.muted = !this.muted;
    if (this.master) this.master.gain.value = this.muted ? 0 : 0.9;
    if (this.muted) this.stopBg(); else this.startBg();
    return this.muted;
  }
};

function updateMuteBtn() {
  const b = document.getElementById('muteBtn');
  if (b) b.textContent = Sound.muted ? '🔇' : '🔊';
}

function onMuteClick() {
  Sound.init();
  Sound.resume();
  Sound.toggleMute();
  updateMuteBtn();
}

let idx = 0, score = 0;
const stage = document.getElementById('stage');

function pips() {
  let s = '<div class="progress-wrap">';
  for (let i = 0; i < quizzes.length; i++) {
    let c = i < idx ? 'done' : (i === idx ? 'current' : '');
    s += `<div class="pip ${c}"></div>`;
  }
  return s + '</div>';
}

function renderIntro() {
  stage.innerHTML = `
    <div class="scene">
      <h1>🍡 떡들의 모험 🍡</h1>
      <div class="subtitle">수학 문제를 풀며 떡집을 탈출하자!</div>
      <div class="actors">
        <div class="actor">${baramSVG}<div class="tag">바람떡</div></div>
        <div class="actor">${butterSVG}<div class="tag">버터떡</div></div>
      </div>
      <div class="speech">
        떡집에서 \"이제 떡을 구워볼까?\" 하는 소리에 깜짝 놀란
        <b>바람떡</b>과 <b>버터떡</b>! \"우리 지금 당장 도망치자!\"<br><br>
        7개의 수학 문제를 풀고 무사히 탈출하도록 도와주세요! 🏃💨
      </div>
      <button class="btn" onclick="startGame()">모험 시작! ▶</button>
    </div>`;
}

function startGame() {
  Sound.init();
  Sound.resume();
  Sound.startBg();
  Sound.sfx('click');
  idx = 0; score = 0; renderQuiz();
}

function renderQuiz() {
  const q = quizzes[idx];
  const shuffled = q.options.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  stage.innerHTML = `
    ${pips()}
    <div class="scene">
      <div class="subtitle">제 ${idx + 1}관문 · ${q.enemyName}</div>
      <div class="actors">
        <div class="actor">${baramSVG}<div class="tag">바람떡</div></div>
        <div class="actor">${butterSVG}<div class="tag">버터떡</div></div>
        <div class="actor"><div class="face">${q.enemy}</div><div class="tag">${q.enemyName}</div></div>
      </div>
      <div class="speech">${q.story}</div>
      <div class="qbox">${q.question}<div class="calc">${q.calc}</div></div>
      <div class="options" id="options">
        ${shuffled.map(o => `<button class="opt" onclick="choose(this,'${o.replace(/'/g,"")}')">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="hint" onclick="document.getElementById('ht').style.display='block'">💡 힌트 보기</div>
      <div class="hint-text" id="ht">${q.hint}</div>
    </div>`;
}

function choose(btn, val) {
  const q = quizzes[idx];
  const fb = document.getElementById('feedback');
  const opts = document.querySelectorAll('.opt');
  if (val === q.answer) {
    btn.classList.add('correct');
    opts.forEach(o => o.disabled = true);
    fb.className = 'feedback good';
    fb.textContent = '🎉 정답! ' + q.win;
    Sound.sfx('correct');
    burstConfetti();
    score++;
    const next = idx + 1 < quizzes.length ? '다음 관문으로 ▶' : '탈출 성공 보기 🏁';
    fb.insertAdjacentHTML('afterend',
      `<div><button class="btn" id="nextBtn">${next}</button></div>`);
    document.getElementById('nextBtn').onclick = () => {
      Sound.sfx('click');
      idx++;
      idx < quizzes.length ? renderQuiz() : renderEnding();
    };
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    fb.className = 'feedback bad';
    fb.textContent = '앗, 다시 한 번 생각해 볼까? 🤔';
    Sound.sfx('wrong');
  }
}

function renderEnding() {
  stage.innerHTML = `
    <div class="scene ending">
      <h1>🏆 탈출 성공! 🏆</h1>
      <div class="actors">
        <div class="actor">${baramSVG}<div class="tag">바람떡</div></div>
        <div class="actor"><div class="face">🪟</div><div class="tag">자유!</div></div>
        <div class="actor">${butterSVG}<div class="tag">버터떡</div></div>
      </div>
      <div class="speech">
        바람떡과 버터떡은 7개의 수학 문제를 모두 풀고
        창문 밖 넓은 세상으로 무사히 탈출했어요! 🌈<br><br>
        수학은 위기에서도 우리를 구해주는 멋진 친구랍니다.
      </div>
      <div class="scoreline">맞춘 관문: <b>${score} / ${quizzes.length}</b> 🌟</div>
      <button class="btn" onclick="renderIntro()">처음부터 다시 ↺</button>
    </div>`;
  updateMuteBtn();
  Sound.stopBg();
  Sound.sfx('fanfare');
  for (let i = 0; i < 60; i++) setTimeout(burstConfetti, i * 40);
}

function burstConfetti() {
  const colors = ['#ff6f3c','#f4b942','#7ad36b','#5bb8ff','#c98aff','#ff8ab0'];
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.left = Math.random() * 100 + 'vw';
  c.style.background = colors[Math.floor(Math.random() * colors.length)];
  c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 3200);
}

/* 배경 구름 생성 */
function makeClouds() {
  for (let i = 0; i < 5; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    const size = 80 + Math.random() * 120;
    c.style.width = size + 'px';
    c.style.height = size * 0.6 + 'px';
    c.style.top = Math.random() * 80 + 'vh';
    c.style.animationDuration = (18 + Math.random() * 22) + 's';
    c.style.animationDelay = -Math.random() * 30 + 's';
    document.body.appendChild(c);
  }
}

makeClouds();
renderIntro();
</script>
</body>
</html>
